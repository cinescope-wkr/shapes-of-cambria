<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2f2f2"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7362F" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#C7362F" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Light, gallery-like tile -->
  <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="40" y="40" width="432" height="432" rx="104" fill="none" stroke="#111111" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Geometric construction lines -->
  <g fill="none" stroke="#111111" stroke-opacity="0.16" stroke-width="3">
    <circle cx="256" cy="256" r="152"/>
    <circle cx="256" cy="256" r="104" stroke-opacity="0.12"/>
    <path d="M256 104 L256 408"/>
    <path d="M104 256 L408 256"/>
    <path d="M148 148 L364 364" stroke-opacity="0.12"/>
    <path d="M364 148 L148 364" stroke-opacity="0.12"/>
  </g>

  <!-- Central hexagon (specimen) -->
  <path d="M256 170
           L330 213
           L330 299
           L256 342
           L182 299
           L182 213 Z"
        fill="#ffffff" fill-opacity="0.75" stroke="#111111" stroke-opacity="0.24" stroke-width="3" />

  <!-- Light-inspired beams -->
  <path d="M256 92 L356 256 L256 420 L156 256 Z" fill="url(#beam)"/>

  <!-- Accent notch -->
  <path d="M256 170 L330 213" stroke="#C7362F" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
  <circle cx="330" cy="213" r="8" fill="#C7362F" opacity="0.95"/>
</svg>
